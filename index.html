<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Title Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-2xl" x-data="{ articleTitle: '', keyword: '', variations: [], loading: false, error: '' }">
        <h1 class="text-3xl font-bold mb-6 text-center">SEO Title Optimizer</h1>
        <p class="text-gray-600 mb-6 text-center">Generate SEO-friendly title variations instantly!</p>

        <div class="mb-4">
            <label for="articleTitle" class="block text-gray-700 text-sm font-bold mb-2">Article Title Idea:</label>
            <input type="text" id="articleTitle" x-model="articleTitle" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="e.g., How to Write Great Blog Posts">
        </div>

        <div class="mb-6">
            <label for="keyword" class="block text-gray-700 text-sm font-bold mb-2">Primary Keyword:</label>
            <input type="text" id="keyword" x-model="keyword" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="e.g., blog posts">
        </div>

        <button @click="console.log('Stripe checkout for ' + '{{ product_name }}' + ' starting.')" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded w-full focus:outline-none focus:shadow-outline mb-4">Unlock Title Variations (One-time purchase)</button>

        <div x-show="loading" class="text-center text-blue-500 mt-4">Generating variations...</div>
        <div x-show="error" class="text-center text-red-500 mt-4" x-text="error"></div>

        <div x-show="variations.length > 0" x-cloak class="mt-8 border-t pt-6">
            <h2 class="text-2xl font-semibold mb-4">Generated Titles:</h2>
            <ul class="space-y-4">
                <template x-for="(variation, index) in variations" :key="index">
                    <li class="bg-gray-50 p-4 rounded-md shadow-sm">
                        <p class="font-medium text-lg" x-text="variation.title"></p>
                        <p class="text-sm text-gray-600">Chars: <span x-text="variation.chars"></span> | Score: <span x-text="variation.score"></span></p>
                    </li>
                </template>
            </ul>
        </div>
    </div>
</body>
</html>
